<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación Exitosa | ITL</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify_content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .icon {
            color: #28a745; /* Verde éxito */
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            color: #800000; /* Guinda ITL */
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #800000;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #5c0000;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">✓</div>
        
        <h1>¡Correo Verificado!</h1>
        
        <p>Tu cuenta institucional ha sido confirmada correctamente.</p>
        <p>Ya puedes cerrar esta ventana y regresar a la aplicación <strong>Reportes ITL</strong> para iniciar sesión.</p>

        </div>

</body>
</html>
